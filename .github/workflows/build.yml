name: Build GX MODS APK

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Upgraded)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: |
          npm install
          npx cap sync || true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK with Gradle (Auto-Find)
        run: |
          find . -name "gradlew" -exec chmod +x {} \;
          find . -name "gradlew" -execdir ./gradlew assembleDebug \;

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: GX-MODS-v1.0
          path: "**/build/outputs/apk/debug/app-debug.apk"
